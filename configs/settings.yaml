# Simple Agent 配置文件

llm:
  # OpenAI API 配置
  api_key: "${OPENAI_API_KEY:sk-your-api-key}"
  model: "gpt-4"
  base_url: "${OPENAI_BASE_URL:https://api.openai.com/v1}"
  max_tokens: 4096
  temperature: 0.7

# 或使用其他兼容 API
# 使用 Azure OpenAI
# llm:
#   api_key: "${AZURE_OPENAI_API_KEY:your-key}"
#   base_url: "${AZURE_OPENAI_ENDPOINT:https://your-resource.openai.azure.com/}"
#   model: "${AZURE_OPENAI_MODEL:gpt-4}"

# 或使用本地模型 (Ollama, vLLM 等)
# llm:
#   api_key: "ollama"  # 任意值
#   base_url: "http://localhost:11434/v1"
#   model: "llama2"
