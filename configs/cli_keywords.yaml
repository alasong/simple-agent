# CLI Agent 关键词配置
# 用于识别用户意图并选择合适的提示词模板
# 避免在代码中硬编码

# 日期查询关键词
date_keywords:
  - "今天"
  - "今日"
  - "当前"
  - "现在"
  - "日期"
  - "几号"
  - "星期"
  - "时间"
  - "现在几点"
  - "几点"
  - "时刻"
  - "最新"
  - "实时"

# 天气查询关键词
weather_keywords:
  - "天气"
  - "气温"
  - "下雨"
  - "刮风"
  - "雾霾"
  - "空气质量"
  - "阴天"
  - "晴天"
  - "多云"
  - "温度"
  - "降水"
  - "风速"

# 实时信息关键词
realtime_keywords:
  - "新闻"
  - "头条"
  - "最新"
  - "股价"
  - "比分"
  - "排名"
  - "热搜"
  - "疫情"
  - "实时"
  - "快讯"
  - "动态"

# 提示词模板
templates:
  date_query: "（请使用 `date` 命令获取当前日期）"
  
  weather: "（**重要：当前准确日期是{date_str}。请务必使用 WebSearchTool 搜索最新天气信息，设置 fetch_content=true，严禁编造数据！**）"
  
  realtime: "（请使用 WebSearchTool 搜索获取最新信息）"

# 日志消息模板
log_messages:
  weather_detection: "[CLI Agent] 检测到天气查询，先获取系统当前日期..."
  current_date: "[CLI Agent] 系统当前日期：{date_str}"

# 星期配置
weekdays:
  - "星期一"
  - "星期二"
  - "星期三"
  - "星期四"
  - "星期五"
  - "星期六"
  - "星期日"

# 任务复杂度判断模式
task_complexity:
  # 简单任务模式（匹配这些直接判断为简单任务）
  simple_patterns:
    - "你好"
    - "您好"
    - "hello"
    - "hi"
    - "谢谢"
    - "感谢"
    - "bye"
    - "再见"
    - "你是谁"
    - "你能做什么"
    - "介绍下"
    - "自我介绍"
    - "打个招呼"

  # 复杂任务模式（匹配这些直接判断为复杂任务）
  complex_patterns:
    - "工作流"
    - "CI/CD"
    - "部署流程"
    - "测试流程"
    - "开发流程"
    - "项目计划"
    - "系统设计"
    - "架构设计"

# LLM 复杂度判断提示词
llm_prompts:
  complexity_judge: |
    你是一个任务复杂度分类器。请判断以下用户输入是否需要多步规划和复杂推理：

    用户输入：{user_input}

    判断标准：
    - 简单任务：单一问题、概念解释、代码片段、翻译、计算、**信息查询**（如天气、新闻、时间、政策、安排等）
    - 复杂任务：需要多步骤、多工具协作、系统设计、流程规划、分析研究、项目执行

    注意：用户查询类问题（如"xxx 安排"、"xxx 时间"、"xxx 政策"）通常是简单信息查询，不是复杂任务。

    请只回答一个词：simple 或 complex
