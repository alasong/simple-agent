# 质量检查清单配置
# Quality Checklist Configuration for Simple Agent

# ===== 通用质量检查清单 =====
general_checklist:
  description: "通用质量检查标准，适用于所有类型的回答"
  items:
    - "回答是否直接解决了用户问题"
    - "是否提供了具体的步骤或示例"
    - "是否有清晰的结论或总结"
    - "是否考虑了边界情况和异常处理"
    - "是否避免了模糊或不确定的表述"
    - "信息组织是否有条理，层次分明"
    - "是否使用了恰当的术语和表达"

# ===== 代码类任务检查清单 =====
code_checklist:
  description: "代码任务质量检查标准"
  items:
    - "代码是否可运行，无语法错误"
    - "是否包含必要的错误处理"
    - "命名是否清晰，符合规范"
    - "是否有适当的注释说明"
    - "是否考虑了性能和安全性"
    - "是否遵循了相关语言的代码规范"
    - "是否包含必要的输入验证"
    - "是否处理了边界条件和异常情况"
    - "代码结构是否清晰，职责分离"
    - "是否避免了常见的安全漏洞"

# ===== 文档类任务检查清单 =====
document_checklist:
  description: "文档任务质量检查标准"
  items:
    - "结构是否清晰，层次分明"
    - "是否使用了恰当的标题和分段"
    - "是否有完整的目录或大纲"
    - "术语使用是否一致"
    - "是否提供了示例或图表说明"
    - "内容是否准确，无事实错误"
    - "是否覆盖了所有关键点"
    - "语言是否简洁明了"
    - "格式是否统一，排版是否美观"
    - "是否包含必要的参考和引用"

# ===== 审查反馈检查清单 =====
review_checklist:
  description: "审查反馈质量检查标准"
  items:
    - "问题描述是否清晰具体"
    - "是否提供了风险等级评估"
    - "改进建议是否可执行"
    - "是否提供了代码示例或参考"
    - "是否包含优先级排序"
    - "是否指出了具体位置（行号/函数名）"
    - "是否解释了问题原因"
    - "是否提供了替代方案"
    - "语气是否建设性，非指责性"
    - "是否总结了整体评估"

# ===== 方案设计检查清单 =====
design_checklist:
  description: "方案设计任务质量检查标准"
  items:
    - "是否理解了业务需求和约束"
    - "是否提供了多种可选方案"
    - "是否分析了各方案的优缺点"
    - "是否考虑了可扩展性和维护性"
    - "是否评估了技术风险"
    - "是否考虑了性能和成本"
    - "是否提供了实施路线图"
    - "是否考虑了安全和合规要求"
    - "是否有清晰的架构图或流程图"
    - "是否包含验收标准"

# ===== 数据分析检查清单 =====
analysis_checklist:
  description: "数据分析任务质量检查标准"
  items:
    - "数据来源是否可靠"
    - "分析方法是否恰当"
    - "是否处理了缺失值和异常值"
    - "统计方法是否正确应用"
    - "结论是否有数据支撑"
    - "是否考虑了混杂因素"
    - "可视化是否清晰准确"
    - "是否避免了因果倒置"
    - "是否说明了分析局限性"
    - "建议是否基于分析结果"

# ===== 质量评分权重配置 =====
scoring_weights:
  # 通用评分权重
  general:
    accuracy: 0.30        # 准确性权重
    completeness: 0.25    # 完整性权重
    clarity: 0.20         # 清晰度权重
    practicality: 0.15    # 实用性权重
    depth: 0.10           # 深度性权重

  # 代码任务评分权重
  code:
    correctness: 0.30     # 正确性
    robustness: 0.25      # 健壮性
    readability: 0.20     # 可读性
    efficiency: 0.15      # 效率
    security: 0.10        # 安全性

  # 文档任务评分权重
  document:
    accuracy: 0.25        # 准确性
    completeness: 0.25    # 完整性
    clarity: 0.25         # 清晰度
    organization: 0.15    # 组织性
    usefulness: 0.10      # 实用性

  # 审查任务评分权重
  review:
    specificity: 0.30     # 具体性
    actionability: 0.30   # 可操作性
    accuracy: 0.20        # 准确性
    prioritization: 0.10  # 优先级
    tone: 0.10            # 语气

# ===== 通过阈值配置 =====
thresholds:
  # 通用通过阈值
  general:
    pass_rate: 0.70       # 检查项通过率
    min_score: 3.0        # 最低分数（1-5 分制）

  # 代码任务通过阈值
  code:
    pass_rate: 0.80       # 代码要求更高
    min_score: 3.5
    critical_checks:      # 必须通过的关键检查
      - "代码可运行"
      - "无安全漏洞"
      - "有错误处理"

  # 文档任务通过阈值
  document:
    pass_rate: 0.75
    min_score: 3.0

  # 审查任务通过阈值
  review:
    pass_rate: 0.80
    min_score: 3.5

# ===== 评估维度定义 =====
evaluation_dimensions:
  accuracy:
    name: "准确性"
    description: "信息正确，无事实错误"
    levels:
      5: "完全准确，所有信息都可验证"
      4: "基本准确，偶有小瑕疵"
      3: "大体准确，有个别错误"
      2: "准确性不足，有多处错误"
      1: "严重错误，信息不可靠"

  completeness:
    name: "完整性"
    description: "覆盖全面，无重要遗漏"
    levels:
      5: "非常完整，覆盖所有方面"
      4: "比较完整，遗漏次要内容"
      3: "基本完整，有少量遗漏"
      2: "不够完整，有重要遗漏"
      1: "严重缺失，关键内容未覆盖"

  practicality:
    name: "实用性"
    description: "建议可执行，方案可落地"
    levels:
      5: "非常实用，立即可用"
      4: "比较实用，稍作调整即可"
      3: "基本实用，需要一定修改"
      2: "实用性不足，需要大改"
      1: "不切实际，难以落地"

  clarity:
    name: "清晰度"
    description: "表达清晰，结构合理"
    levels:
      5: "非常清晰，一目了然"
      4: "比较清晰，易于理解"
      3: "基本清晰，需要思考"
      2: "不够清晰，理解困难"
      1: "混乱不清，难以理解"

  depth:
    name: "深度性"
    description: "分析深入，非表面描述"
    levels:
      5: "非常深入，洞察深刻"
      4: "比较深入，有一定分析"
      3: "基本深入，有分析"
      2: "深度不足，较为表面"
      1: "缺乏深度，仅表面描述"
