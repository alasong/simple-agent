<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Agent - Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .status {
            font-size: 14px;
            color: #22c55e;
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-agent {
            font-weight: 600;
            color: #333;
        }

        .task-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-running { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-failed { background: #fee2e2; color: #991b1b; }
        .status-cancelled { background: #e5e7eb; color: #374151; }

        .task-input {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .task-meta {
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            gap: 16px;
        }

        .output-panel {
            background: #1f2937;
            color: #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .api-key-input {
            display: flex;
            gap: 8px;
        }

        .api-key-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        .progress-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                🤖 Simple Agent
                <span style="font-size: 14px; color: #666; font-weight: normal;">| 多 Agent 协作平台</span>
            </h1>
            <div class="status">
                <span class="status-dot"></span>
                服务运行中
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left: Task Submission -->
            <div class="card">
                <h2>📝 提交任务</h2>

                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <div class="api-key-input">
                        <input type="text" id="apiKey" placeholder="sk-..." />
                        <button class="btn btn-secondary" onclick="generateApiKey()">生成</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="agentSelect">选择 Agent</label>
                    <select id="agentSelect">
                        <option value="developer">Developer (开发)</option>
                        <option value="reviewer">Reviewer (审查)</option>
                        <option value="tester">Tester (测试)</option>
                        <option value="product_manager">Product Manager (产品)</option>
                        <option value="documenter">Documenter (文档)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="taskInput">任务描述</label>
                    <textarea id="taskInput" placeholder="请输入任务描述，例如：分析当前目录的项目结构..."></textarea>
                </div>

                <button class="btn btn-primary" id="submitBtn" onclick="submitTask()">
                    🚀 提交任务
                </button>
            </div>

            <!-- Right: Task List -->
            <div class="card">
                <h2>📋 任务列表</h2>
                <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                    <button class="btn btn-secondary" onclick="loadTasks()">🔄 刷新</button>
                    <button class="btn btn-secondary" onclick="clearTasks()">🗑️ 清空</button>
                </div>
                <div class="task-list" id="taskList">
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        <p>暂无任务</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="card">
            <h2>📤 输出结果</h2>
            <div class="output-panel" id="outputPanel">
                <span style="color: #6b7280;">任务输出将显示在这里...</span>
            </div>
        </div>
    </div>

    <script>
        // API 基础 URL（假设 API 服务器运行在 8000 端口）
        const API_BASE = 'http://localhost:8000/api/v1';

        // 存储任务列表
        let tasks = [];

        // 页面加载时获取 Agent 列表
        async function loadAgents() {
            try {
                const apiKey = localStorage.getItem('api_key') || '';
                const response = await fetch(`${API_BASE}/agent/list?X-API-Key=${apiKey}`);
                if (response.ok) {
                    const data = await response.json();
                    const select = document.getElementById('agentSelect');
                    select.innerHTML = '';
                    data.agents.forEach(agent => {
                        const option = document.createElement('option');
                        option.value = agent.name;
                        option.textContent = `${agent.name} - ${agent.description || ''}`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.log('无法加载 Agent 列表，使用默认列表');
            }
        }

        // 加载任务列表
        async function loadTasks() {
            const taskListEl = document.getElementById('taskList');
            taskListEl.innerHTML = '<div class="empty-state"><p>加载中...</p></div>';

            // 从本地存储加载
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                renderTasks();
            } else {
                taskListEl.innerHTML = '<div class="empty-state"><p>暂无任务</p></div>';
            }
        }

        // 渲染任务列表
        function renderTasks() {
            const taskListEl = document.getElementById('taskList');

            if (tasks.length === 0) {
                taskListEl.innerHTML = '<div class="empty-state"><p>暂无任务</p></div>';
                return;
            }

            taskListEl.innerHTML = tasks.slice().reverse().map(task => `
                <div class="task-item" onclick="showTaskOutput('${task.task_id}')">
                    <div class="task-header">
                        <span class="task-agent">${task.agent_name}</span>
                        <span class="task-status status-${task.status}">${getStatusText(task.status)}</span>
                    </div>
                    <div class="task-input">${escapeHtml(task.input || '无输入')}</div>
                    <div class="task-meta">
                        <span>ID: ${task.task_id.slice(0, 8)}...</span>
                        <span>${formatTime(task.created_at)}</span>
                    </div>
                    ${task.status === 'running' ? `
                        <div class="progress-bar">
                            <div class="progress-bar-fill" style="width: ${task.progress || 50}%"></div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 获取状态文本
        function getStatusText(status) {
            const texts = {
                'pending': '等待中',
                'running': '运行中',
                'completed': '已完成',
                'failed': '失败',
                'cancelled': '已取消'
            };
            return texts[status] || status;
        }

        // 提交任务
        async function submitTask() {
            const apiKey = document.getElementById('apiKey').value || localStorage.getItem('api_key') || '';
            const agentName = document.getElementById('agentSelect').value;
            const input = document.getElementById('taskInput').value.trim();

            if (!input) {
                alert('请输入任务描述');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const response = await fetch(`${API_BASE}/agent/run?X-API-Key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        agent_name: agentName,
                        input: input
                    })
                });

                if (response.ok) {
                    const data = await response.json();

                    // 添加到任务列表
                    tasks.push({
                        task_id: data.task_id,
                        agent_name: agentName,
                        input: input,
                        status: 'running',
                        created_at: new Date().toISOString()
                    });
                    localStorage.setItem('tasks', JSON.stringify(tasks));

                    // 清空输入框
                    document.getElementById('taskInput').value = '';

                    // 刷新任务列表
                    renderTasks();

                    // 开始轮询任务状态
                    pollTaskStatus(data.task_id);

                    // 显示输出面板
                    document.getElementById('outputPanel').innerHTML = '<span style="color: #9ca3af;">任务已提交，正在处理中...</span>';
                } else {
                    const error = await response.json();
                    alert(`提交失败：${error.detail || '未知错误'}`);
                }
            } catch (error) {
                alert(`提交失败：${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 提交任务';
            }
        }

        // 轮询任务状态
        async function pollTaskStatus(taskId) {
            const apiKey = localStorage.getItem('api_key') || '';
            const maxAttempts = 120; // 最多轮询 60 秒（每 0.5 秒一次）
            let attempts = 0;

            const poll = async () => {
                try {
                    const response = await fetch(`${API_BASE}/task/${taskId}/status?X-API-Key=${apiKey}`);
                    if (response.ok) {
                        const data = await response.json();

                        // 更新任务列表中的状态
                        const taskIndex = tasks.findIndex(t => t.task_id === taskId);
                        if (taskIndex !== -1) {
                            tasks[taskIndex].status = data.status;
                            tasks[taskIndex].output = data.output;
                            tasks[taskIndex].completed_at = data.completed_at;
                            localStorage.setItem('tasks', JSON.stringify(tasks));
                            renderTasks();
                        }

                        // 更新输出面板
                        if (data.output) {
                            document.getElementById('outputPanel').textContent = data.output;
                        }

                        // 如果任务完成或失败，停止轮询
                        if (data.status === 'completed' || data.status === 'failed' || data.status === 'cancelled') {
                            return;
                        }
                    }
                } catch (error) {
                    console.log('轮询失败:', error);
                }

                attempts++;
                if (attempts < maxAttempts) {
                    setTimeout(poll, 2000); // 每 2 秒轮询一次
                }
            };

            poll();
        }

        // 显示任务输出
        async function showTaskOutput(taskId) {
            const apiKey = localStorage.getItem('api_key') || '';

            try {
                const response = await fetch(`${API_BASE}/task/${taskId}/status?X-API-Key=${apiKey}`);
                if (response.ok) {
                    const data = await response.json();

                    if (data.output) {
                        document.getElementById('outputPanel').textContent = data.output;
                    } else {
                        document.getElementById('outputPanel').innerHTML = '<span style="color: #6b7280;">暂无输出</span>';
                    }
                }
            } catch (error) {
                console.log('获取任务详情失败:', error);
            }
        }

        // 清空任务
        function clearTasks() {
            if (confirm('确定要清空所有任务吗？')) {
                tasks = [];
                localStorage.removeItem('tasks');
                renderTasks();
            }
        }

        // 生成 API Key（调用 API）
        async function generateApiKey() {
            // 简单生成一个随机 key（实际应该调用 API）
            const key = 'sk-' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
            document.getElementById('apiKey').value = key;
            localStorage.setItem('api_key', key);
            alert('API Key 已生成（注意：这是本地使用的简易 key，生产环境请通过 API 获取）');
        }

        // 工具函数：转义 HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 工具函数：格式化时间
        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            // 加载保存的 API Key
            const savedKey = localStorage.getItem('api_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }

            loadAgents();
            loadTasks();
        });
    </script>
</body>
</html>
